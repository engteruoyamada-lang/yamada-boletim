name: Boletim Meteorológico Diário

on:
  schedule:
    # Executa todos os dias às 08h30 UTC
    - cron: '30 8 * * *'
  workflow_dispatch:  # Permite execução manual

jobs:
  boletim:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configurar variáveis de ambiente
        env:
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
        run: |
          echo "GMAIL_SENDER_EMAIL=$GMAIL_SENDER_EMAIL" >> .env
          echo "$GMAIL_CREDENTIALS_JSON" > secrets/gmail_credentials.json
          echo "RECIPIENT_EMAILS=$RECIPIENT_EMAILS" >> .env

      - name: Executar pipeline de boletim
        run: python -m src.main

      - name: Commit de boletins (opcional)
        if: success()
        run: |
          git config --global user.name "Yamada Bot"
          git config --global user.email "eng.teruoyamada@ymail.com"
          git add boletins/
          git commit -m "Boletim diário: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || true
          git push

      - name: Notificar em caso de erro
        if: failure()
        run: echo "❌ Pipeline falhou!"
